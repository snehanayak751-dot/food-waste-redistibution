{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow mt-5">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Donate Food</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
    {% csrf_token %}
    
    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Submit Donation</button>
</form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
