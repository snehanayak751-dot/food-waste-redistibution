<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FoodBridge | Waste Redistribution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        .navbar-brand { font-size: 1.5rem; }
        footer { background: #f8f9fa; padding: 20px 0; margin-top: 40px; border-top: 1px solid #dee2e6; }
        .profile-icon {
            width: 35px;
            height: 35px;
            background-color: white;
            color: #198754; /* Success Green */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .profile-icon:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">FoodBridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                    <a class="nav-link text-white" href="{% url 'food_list' %}">Available Food</a>
                    
                    {% if user.is_authenticated %}
                        <a class="nav-link text-white" href="{% url 'volunteer_dashboard' %}">Dashboard</a>
                        
                        <a href="{% url 'profile' %}" class="nav-link ms-2" title="View Profile"></a>
                            <div class="profile-icon">
                                <i class="bi bi-person-fill"></i>
                            </div>
                        </a>

                        <form action="{% url 'logout' %}" method="post" class="ms-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-light rounded-pill">Logout</button>
                        </form>
                    {% else %}
                        <a class="nav-link text-white" href="{% url 'register_ngo' %}">Register NGO</a>
                        <a class="nav-link text-white" href="{% url 'register_volunteer' %}">Join as Volunteer</a>
                        <a class="nav-link btn btn-light text-success btn-sm ms-2 px-3 fw-bold rounded-pill" href="{% url 'login' %}">Login</a>
                    {% endif %}
                    
                    <a class="nav-link text-white fw-bold ms-lg-3" href="/admin/">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center">
        <p class="text-muted mb-0">&copy; 2026 FoodBridge Redistribution System.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
