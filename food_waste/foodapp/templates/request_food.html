{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Request Surplus Food</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{% url 'request_food' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Available Food</label>
                        <select name="food_id" class="form-select" required>
                            <option value="" disabled selected>-- Choose a food batch --</option>
                            {% for food in available_food %}
                                <option value="{{ food.id }}">{{ food.name }} ({{ food.quantity }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Reason for Request</label>
                        <textarea name="reason" class="form-control" rows="3" placeholder="e.g. Distribution at local shelter" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2">Submit Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
